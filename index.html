<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solari Split-Flap Display</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sf-body-bg: #000000;
      --sf-board-bg: #0a0a0a;
      --sf-flap-top: #111111;
      --sf-flap-bottom: #0d0d0d;
      --sf-gap-line: #000000;
      --sf-text: #ffffff;
      --sf-author: #00aef0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      background: var(--sf-body-bg);
      font-family: Helvetica, Arial, sans-serif;
    }

    .split-flap-board {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 1.5rem;
      background: var(--sf-board-bg);
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .split-flap-row {
      display: flex;
      gap: 3px;
      flex: 1;
    }

    .split-flap-cell {
      flex: 1;
      perspective: 15vw;
    }

    .flap-display {
      position: relative;
      width: 100%;
      height: 100%;
      font-family: Helvetica, Arial, sans-serif;
      font-size: clamp(0.6rem, 3vw, 3rem);
      font-weight: 400;
      color: var(--sf-text);
      text-align: center;
    }

    .flap-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(50% - 0.25px);
      background: var(--sf-flap-top);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 1.5px), calc(100% - 1.5px) 100%, 1.5px 100%, 0 calc(100% - 1.5px));
      overflow: hidden;
      z-index: 1;
    }

    .flap-top .flap-char {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: calc(50% - 0.25px);
      background: var(--sf-flap-bottom);
      clip-path: polygon(1.5px 0, calc(100% - 1.5px) 0, 100% 1.5px, 100% 100%, 0 100%, 0 1.5px);
      overflow: hidden;
      z-index: 1;
    }

    .flap-bottom .flap-char {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-flip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    .flap-flip.flipping {
      display: block;
      animation: flapDown 0.15s ease-in forwards;
    }

    .flap-flip-front {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--sf-flap-top);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 1.5px), calc(100% - 1.5px) 100%, 1.5px 100%, 0 calc(100% - 1.5px));
      backface-visibility: hidden;
      overflow: hidden;
    }

    .flap-flip-front .flap-char {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-flip-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--sf-flap-bottom);
      clip-path: polygon(1.5px 0, calc(100% - 1.5px) 0, 100% 1.5px, 100% 100%, 0 100%, 0 1.5px);
      backface-visibility: hidden;
      transform: rotateX(180deg);
      overflow: hidden;
    }

    .flap-flip-back .flap-char {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Gap line removed — board bg gap between top/bottom halves provides the split */

    .split-flap-cell.author-cell .flap-top .flap-char,
    .split-flap-cell.author-cell .flap-bottom .flap-char,
    .split-flap-cell.author-cell .flap-flip-front .flap-char,
    .split-flap-cell.author-cell .flap-flip-back .flap-char {
      color: var(--sf-author);
    }

    @keyframes flapDown {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-180deg); }
    }

  </style>
</head>
<body>

<div class="split-flap-board" id="board"></div>

<script>
(function() {
  // ──────────────────────────────────────────────
  // Configuration
  // ──────────────────────────────────────────────
  var COLS = 20;
  var ROWS = 8;
  var FLIP_MS = 150;       // single flap animation duration
  var CHAR_DELAY = 50;     // ms stagger between cells in cascade
  var HOLD_MS = 5000;      // hold finished quote before next

  // ──────────────────────────────────────────────
  // Quotes — each entry is an array of lines.
  // Lines prefixed with @ are author names (yellow).
  // ──────────────────────────────────────────────
  var quotes = [
    ['THE BEST WAY TO',
     'PREDICT THE FUTURE',
     'IS TO INVENT IT.',
     '',
     '@ALAN KAY'],

    ['DESIGN IS NOT JUST',
     'WHAT IT LOOKS LIKE.',
     'DESIGN IS HOW',
     'IT WORKS.',
     '',
     '@STEVE JOBS'],

    ['SIMPLICITY IS THE',
     'ULTIMATE',
     'SOPHISTICATION.',
     '',
     '@LEONARDO DA VINCI'],

    ['MAKE IT SIMPLE,',
     'BUT SIGNIFICANT.',
     '',
     '@DON DRAPER'],

    ['STAY HUNGRY.',
     'STAY FOOLISH.',
     '',
     '@STEWART BRAND'],

    ['GOOD DESIGN IS',
     'AS LITTLE DESIGN',
     'AS POSSIBLE.',
     '',
     '@DIETER RAMS'],

    ['THE DETAILS ARE NOT',
     'THE DETAILS. THEY',
     'MAKE THE DESIGN.',
     '',
     '@CHARLES EAMES'],

    ['HAVE THE COURAGE',
     'TO FOLLOW YOUR',
     'HEART AND',
     'INTUITION.',
     '',
     '@STEVE JOBS'],

    ['I THINK,',
     'THEREFORE I AM.',
     '',
     '@RENE DESCARTES'],

    ['THE ONLY THING WE',
     'HAVE TO FEAR IS',
     'FEAR ITSELF.',
     '',
     '@FRANKLIN ROOSEVELT'],

    ['IMAGINATION IS',
     'MORE IMPORTANT',
     'THAN KNOWLEDGE.',
     '',
     '@ALBERT EINSTEIN'],

    ['TO BE OR NOT',
     'TO BE, THAT IS',
     'THE QUESTION.',
     '',
     '@SHAKESPEARE'],

    ['IN THE MIDDLE OF',
     'DIFFICULTY LIES',
     'OPPORTUNITY.',
     '',
     '@ALBERT EINSTEIN'],

    ['THE UNEXAMINED',
     'LIFE IS NOT WORTH',
     'LIVING.',
     '',
     '@SOCRATES'],

    ['WE ARE WHAT WE',
     'REPEATEDLY DO.',
     'EXCELLENCE IS',
     'NOT AN ACT,',
     'BUT A HABIT.',
     '',
     '@ARISTOTLE'],

    ['IF YOU ARE GOING',
     'THROUGH HELL,',
     'KEEP GOING.',
     '',
     '@CHURCHILL'],

    ['BE THE CHANGE YOU',
     'WISH TO SEE IN',
     'THE WORLD.',
     '',
     '@GANDHI'],

    ['THAT WHICH DOES',
     'NOT KILL US MAKES',
     'US STRONGER.',
     '',
     '@NIETZSCHE'],

    ['I HAVE NOT FAILED.',
     'I HAVE JUST FOUND',
     '10000 WAYS THAT',
     'WONT WORK.',
     '',
     '@THOMAS EDISON'],

    ['THE MEDIUM IS',
     'THE MESSAGE.',
     '',
     '@MARSHALL MCLUHAN']
  ];

  // ──────────────────────────────────────────────
  // Build DOM
  // ──────────────────────────────────────────────
  var board = document.getElementById('board');

  for (var r = 0; r < ROWS; r++) {
    var row = document.createElement('div');
    row.className = 'split-flap-row';
    for (var c = 0; c < COLS; c++) {
      row.innerHTML +=
        '<div class="split-flap-cell">' +
          '<div class="flap-display">' +
            '<div class="flap-top"><span class="flap-char">&nbsp;</span></div>' +
            '<div class="flap-bottom"><span class="flap-char">&nbsp;</span></div>' +
            '<div class="flap-flip">' +
              '<div class="flap-flip-front"><span class="flap-char">&nbsp;</span></div>' +
              '<div class="flap-flip-back"><span class="flap-char">&nbsp;</span></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }
    board.appendChild(row);
  }

  var cells = board.querySelectorAll('.split-flap-cell');
  var totalCells = COLS * ROWS;
  var currentChars = [];
  for (var i = 0; i < totalCells; i++) currentChars.push(' ');

  // ──────────────────────────────────────────────
  // Audio — synthesized mechanical click
  // ──────────────────────────────────────────────
  var audioCtx = null;
  var soundEnabled = false;

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      soundEnabled = true;
    } catch(e) { soundEnabled = false; }
  }

  function playClick() {
    if (!soundEnabled || !audioCtx) return;
    var duration = 0.012;
    var now = audioCtx.currentTime;
    var bufferSize = Math.ceil(audioCtx.sampleRate * duration);
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.3;
    }
    var source = audioCtx.createBufferSource();
    source.buffer = buffer;
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3000 + Math.random() * 1000;
    filter.Q.value = 1.5;
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.08 + Math.random() * 0.04, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(now);
    source.stop(now + duration);
  }

  document.addEventListener('click', function() { initAudio(); }, { once: true });
  document.addEventListener('keydown', function() { initAudio(); }, { once: true });
  document.addEventListener('mousemove', function() { initAudio(); }, { once: true });

  // ──────────────────────────────────────────────
  // Drum — fixed character sequence (physically correct)
  // The blank flap is position 0 on the drum.
  // The drum only spins forward, never backward.
  // ──────────────────────────────────────────────
  var drum = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:;!?\'-';
  var drumIndex = {};
  for (var di = 0; di < drum.length; di++) drumIndex[drum[di]] = di;

  // Per-cell timer tracking
  var cellTimers = [];
  for (var ct = 0; ct < totalCells; ct++) cellTimers.push([]);

  function cancelCell(index) {
    var timers = cellTimers[index];
    for (var t = 0; t < timers.length; t++) clearTimeout(timers[t]);
    cellTimers[index] = [];
  }

  // ──────────────────────────────────────────────
  // Flip a single cell to a new character
  // ──────────────────────────────────────────────
  function flipCell(index, newChar) {
    var cell = cells[index];
    if (!cell) return;

    var oldChar = currentChars[index];
    if (oldChar === newChar) return;

    var topChar = cell.querySelector('.flap-top .flap-char');
    var bottomChar = cell.querySelector('.flap-bottom .flap-char');
    var flip = cell.querySelector('.flap-flip');
    var flipFront = cell.querySelector('.flap-flip-front .flap-char');
    var flipBack = cell.querySelector('.flap-flip-back .flap-char');

    flip.classList.remove('flipping');

    flipFront.textContent = oldChar;
    flipBack.textContent = newChar;
    bottomChar.textContent = newChar;

    void flip.offsetWidth;
    flip.classList.add('flipping');
    playClick();

    var tid = setTimeout(function() {
      topChar.textContent = newChar;
      flip.classList.remove('flipping');
      currentChars[index] = newChar;
    }, FLIP_MS);
    cellTimers[index].push(tid);
  }

  // ──────────────────────────────────────────────
  // Drum cycle — spin forward through every
  // intermediate character (like real hardware).
  // Fast at start, decelerates toward the end.
  // ──────────────────────────────────────────────
  function drumToChar(index, targetChar, baseDelay) {
    cancelCell(index);

    var fromIdx = drumIndex[currentChars[index]];
    var toIdx = drumIndex[targetChar];
    if (fromIdx === undefined) fromIdx = 0;
    if (toIdx === undefined) toIdx = 0;

    var steps = [];
    var pos = fromIdx;
    while (pos !== toIdx) {
      pos = (pos + 1) % drum.length;
      steps.push(drum[pos]);
    }

    if (steps.length === 0) return 0;

    var minGap = 35;
    var maxGap = 160;
    var cumulative = 0;

    for (var s = 0; s < steps.length; s++) {
      var progress = s / steps.length;
      var gap = minGap + (maxGap - minGap) * progress * progress;
      var tid = (function(t, ch) {
        return setTimeout(function() {
          flipCell(index, ch);
        }, baseDelay + t);
      })(cumulative, steps[s]);
      cellTimers[index].push(tid);
      cumulative += gap;
    }

    return cumulative + FLIP_MS;
  }

  // ──────────────────────────────────────────────
  // Layout — center quote block on the board.
  // Quote lines left-aligned, author right-aligned.
  // ──────────────────────────────────────────────
  function layoutQuote(lines) {
    var grid = [];
    var authorRows = {};
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) row.push(' ');
      grid.push(row);
    }

    var usedRows = Math.min(lines.length, ROWS);
    var startRow = Math.floor((ROWS - usedRows) / 2);

    for (var l = 0; l < usedRows; l++) {
      var line = lines[l] || '';
      var isAuthor = line.charAt(0) === '@';
      if (isAuthor) line = line.substring(1);
      if (line.length > COLS) line = line.substring(0, COLS);
      var pad = isAuthor ? (COLS - line.length) : 0;
      if (isAuthor) authorRows[startRow + l] = true;
      for (var ch = 0; ch < line.length; ch++) {
        grid[startRow + l][pad + ch] = line[ch];
      }
    }

    return { grid: grid, authorRows: authorRows };
  }

  // ──────────────────────────────────────────────
  // Display — cascade drum cycles across the board
  // ──────────────────────────────────────────────
  function displayQuote(result, callback) {
    var grid = result.grid;
    var authorRows = result.authorRows;

    // Apply author classes per-cell only after each cell's drum settles
    var maxDrumTime = 0;

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var idx = r * COLS + c;
        var target = grid[r][c];
        var delay = (r * COLS + c) * CHAR_DELAY;

        if (currentChars[idx] !== target) {
          var drumTime = drumToChar(idx, target, delay);
          if (delay + drumTime > maxDrumTime) maxDrumTime = delay + drumTime;
        }

        // Schedule author class change per-cell after its drum finishes
        (function(cellIdx, row, cellDelay) {
          var tid = setTimeout(function() {
            if (authorRows[row]) {
              cells[cellIdx].classList.add('author-cell');
            } else {
              cells[cellIdx].classList.remove('author-cell');
            }
          }, cellDelay + FLIP_MS + 50);
          cellTimers[cellIdx].push(tid);
        })(idx, r, delay);
      }
    }

    setTimeout(callback, maxDrumTime + HOLD_MS);
  }

  // ──────────────────────────────────────────────
  // Shuffle and cycle
  // ──────────────────────────────────────────────
  var shuffled = quotes.slice();
  for (var si = shuffled.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffled[si];
    shuffled[si] = shuffled[sj];
    shuffled[sj] = tmp;
  }

  var qIndex = 0;
  function cycle() {
    var quote = shuffled[qIndex % shuffled.length];
    var result = layoutQuote(quote);
    displayQuote(result, function() {
      qIndex++;
      cycle();
    });
  }

  setTimeout(cycle, 800);
})();
</script>

</body>
</html>

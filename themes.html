<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solari Theme Gallery</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 3rem 1rem;
      color: #ccc;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #f0f0f0;
    }
    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 3rem;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .theme-card {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .theme-label {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2em 0.5em;
      border-radius: 3px;
      z-index: 10;
    }

    .theme-board {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 1.25rem;
      border-radius: 12px;
    }

    .theme-row {
      display: flex;
      gap: 2px;
    }

    .theme-cell {
      width: 22px;
      height: 30px;
      position: relative;
      font-family: "SF Mono", "Fira Code", "Roboto Mono", monospace;
      font-size: 0.8rem;
      font-weight: bold;
      text-align: center;
    }

    .tc-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      border-radius: 2px 2px 0 0;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .tc-top span {
      position: absolute;
      top: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tc-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      border-radius: 0 0 2px 2px;
      overflow: hidden;
    }
    .tc-bottom span {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Gap line between top and bottom */
    .tc-top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      z-index: 2;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .theme-cell {
        width: 16px;
        height: 22px;
        font-size: 0.6rem;
      }
      .theme-board {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>

<h1>Solari Theme Gallery</h1>
<p class="subtitle">10 built-in themes &middot; press T in the main display to cycle</p>

<div class="gallery" id="gallery"></div>

<script>
(function() {
  function hsl(h, s, l) {
    return 'hsl(' + h + ', ' + s + '%, ' + l + '%)';
  }

  function generateTheme(hue, sat, mode) {
    if (mode === 'dark') {
      return {
        bodyBg:    hsl(hue, sat, 6),
        boardBg:   hsl(hue, sat, 10),
        flapTop:   hsl(hue, sat, 18),
        flapBottom: hsl(hue, sat, 14),
        gapLine:   hsl(hue, sat, 6),
        text:      hsl(hue, Math.min(sat, 10), 94),
        author:    sat === 0 ? hsl(45, 85, 60) : hsl(hue, Math.max(sat, 50), 65),
        labelBg:   'rgba(255,255,255,0.1)',
        labelText: hsl(hue, Math.min(sat, 10), 80)
      };
    } else {
      return {
        bodyBg:    hsl(hue, sat, 95),
        boardBg:   hsl(hue, sat, 88),
        flapTop:   hsl(hue, sat, 82),
        flapBottom: hsl(hue, sat, 76),
        gapLine:   hsl(hue, sat, 70),
        text:      hsl(hue, sat, 10),
        author:    sat === 0 ? hsl(45, 85, 42) : hsl(hue, Math.max(sat, 40), 35),
        labelBg:   'rgba(0,0,0,0.08)',
        labelText: hsl(hue, sat, 30)
      };
    }
  }

  var themes = [
    { name: 'classic',   hue: 0,   sat: 0,  mode: 'dark' },
    { name: 'mint',      hue: 155, sat: 30, mode: 'dark' },
    { name: 'ocean',     hue: 210, sat: 35, mode: 'dark' },
    { name: 'purple',    hue: 270, sat: 30, mode: 'dark' },
    { name: 'amber',     hue: 35,  sat: 40, mode: 'dark' },
    { name: 'rose',      hue: 345, sat: 25, mode: 'dark' },
    { name: 'fog',       hue: 0,   sat: 0,  mode: 'light' },
    { name: 'sage',      hue: 140, sat: 15, mode: 'light' },
    { name: 'lavender',  hue: 260, sat: 20, mode: 'light' },
  ];

  // Sample text for each mini board
  var sampleLines = [
    { text: 'SIMPLICITY IS', author: false },
    { text: 'THE ULTIMATE', author: false },
    { text: 'SOPHISTICATION.', author: false },
    { text: '', author: false },
    { text: 'LEONARDO DA VINCI', author: true }
  ];

  var COLS = 18;
  var ROWS = 5;

  var gallery = document.getElementById('gallery');

  themes.forEach(function(t) {
    var theme = generateTheme(t.hue, t.sat, t.mode);

    var card = document.createElement('div');
    card.className = 'theme-card';
    card.style.background = theme.bodyBg;

    var label = document.createElement('div');
    label.className = 'theme-label';
    label.textContent = t.name + ' (' + t.mode + ')';
    label.style.background = theme.labelBg;
    label.style.color = theme.labelText;
    card.appendChild(label);

    var board = document.createElement('div');
    board.className = 'theme-board';
    board.style.background = theme.boardBg;

    var startRow = 0;

    for (var r = 0; r < ROWS; r++) {
      var row = document.createElement('div');
      row.className = 'theme-row';

      var lineData = sampleLines[r] || { text: '', author: false };
      var text = lineData.text;
      var isAuthor = lineData.author;
      var color = isAuthor ? theme.author : theme.text;

      // Right-align author, left-align quote
      var pad = isAuthor ? Math.max(0, COLS - text.length) : 0;

      for (var c = 0; c < COLS; c++) {
        var ch = (c >= pad && c < pad + text.length) ? text[c - pad] : '\u00A0';

        var cell = document.createElement('div');
        cell.className = 'theme-cell';

        var top = document.createElement('div');
        top.className = 'tc-top';
        top.style.background = theme.flapTop;
        var topSpan = document.createElement('span');
        topSpan.textContent = ch;
        topSpan.style.color = color;
        top.appendChild(topSpan);
        top.style.setProperty('--gap', theme.gapLine);

        var style = document.createElement('style');
        // Use inline for gap line
        top.insertAdjacentHTML('beforeend', '<span style="position:absolute;bottom:0;left:0;right:0;height:1px;background:' + theme.gapLine + ';z-index:2;display:block;"></span>');

        var bottom = document.createElement('div');
        bottom.className = 'tc-bottom';
        bottom.style.background = theme.flapBottom;
        var bottomSpan = document.createElement('span');
        bottomSpan.textContent = ch;
        bottomSpan.style.color = color;
        bottom.appendChild(bottomSpan);

        cell.appendChild(top);
        cell.appendChild(bottom);
        row.appendChild(cell);
      }

      board.appendChild(row);
    }

    card.appendChild(board);
    gallery.appendChild(card);
  });
})();
</script>

</body>
</html>
